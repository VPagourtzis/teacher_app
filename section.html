<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Τμήμα </title>
  <link rel="stylesheet" href="style.css">
  <script src="libs/xlsx.full.min.js" defer></script>
  <script src="section.js" defer></script>
</head>
<body>
  <header class="main-header section-header-main">
    <div>
      <a href="index.html" class="back-link" aria-label="Επιστροφή στην αρχική σελίδα" title="Επιστροφή">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Επιστροφή</span>
      </a>
      <h1 id="section-title"> Τμήμα </h1>
      <p id="year-title"> </p>
    </div>

    <div class="history-navigation" aria-label="Επιλογή σχολικής χρονιάς και τμήματος">
      <div class="history-navigation-field">
        <label for="year-selector">Σχολική χρονιά</label>
        <select id="year-selector" aria-label="Επιλογή σχολικής χρονιάς"></select>
      </div>

      <div class="history-navigation-field">
        <label for="section-selector">Τμήμα</label>
        <select id="section-selector" aria-label="Επιλογή τμήματος"></select>
      </div>
    </div>
  </header>

  <main class="page-container section-page">
    <section class="date-toolbar" aria-labelledby="working-date-label">
      <div>
        <label id="working-date-label" for="working-date">Επεξεργασία ημερομηνίας</label>
        <p id="date-filter-description">Προβάλλονται όλες οι ημερομηνίες και τα συνολικά στατιστικά.</p>
      </div>
      <div class="date-filter-controls">
        <button id="show-all-dates-button" class="all-dates-button active" type="button">Όλες οι ημερομηνίες</button>
        <input id="working-date" type="date" aria-label="Επιλογή συγκεκριμένης ημερομηνίας">
      </div>
    </section>

    <nav class="section-tabs" aria-label="Επιλογές τμήματος">
      <button class="tab-button active" data-tab="statistics"> Στατιστικά μαθητών </button>
      <button class="tab-button" data-tab="absences"> Απουσίες </button>
      <button class="tab-button" data-tab="exams"> Γραπτά </button>
      <button class="tab-button" data-tab="exercises"> Ασκήσεις </button>
      <button class="tab-button" data-tab="participation"> Συμμετοχή </button>
    </nav>

    <section id="statistics-panel" class="tab-panel active" data-panel="statistics">
      <div class="panel-heading">
        <div> <h2> Στατιστικά μαθητών </h2> </div>
      </div>
      
      <div
        id="statistics-hidden-columns"
        class="hidden-columns-bar"
        hidden
      ></div>
      
      <div class="data-table-wrapper">
        <table class="data-table summary-table">
          <thead id="statistics-head"></thead>
          <tbody id="statistics-body"></tbody>
        </table>
      </div>

      <button id="add-student-button" class="floating-add-button" type="button" aria-label="Προσθήκη μαθητή">+</button>
    </section>

    <section id="absences-panel" class="tab-panel" data-panel="absences">
      <div class="panel-heading">
        <div>
          <h2> Απουσίες </h2>
        </div>
        <button class="primary-action-button" data-add-item="absences" type="button"> + Καταχώριση </button>
      </div>
      <div id="absences-hidden-records" class="hidden-records-bar" hidden></div>
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead id="absences-head"></thead>
          <tbody id="absences-body"></tbody>
        </table>
      </div>
    </section>

    <section id="exams-panel" class="tab-panel" data-panel="exams">
      <div class="panel-heading">
        <div>
          <h2> Γραπτά </h2>
        </div>
        <button class="primary-action-button" data-add-item="exams" type="button"> + Γραπτό </button>
      </div>
      <div id="exams-hidden-records" class="hidden-records-bar" hidden></div>
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead id="exams-head"></thead>
          <tbody id="exams-body"></tbody>
        </table>
      </div>
    </section>

    <section id="exercises-panel" class="tab-panel" data-panel="exercises">
      <div class="panel-heading">
        <div>
          <h2> Ασκήσεις </h2>
        </div>
        <button class="primary-action-button" data-add-item="exercises" type="button">+ Καταχώριση </button>
      </div>
      <div id="exercises-hidden-records" class="hidden-records-bar" hidden></div>
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead id="exercises-head"></thead>
          <tbody id="exercises-body"></tbody>
        </table>
      </div>
    </section>

    <section id="participation-panel" class="tab-panel" data-panel="participation">
      <div class="panel-heading">
        <div>
          <h2> Συμμετοχή </h2>
        </div>
        <button class="primary-action-button" data-add-item="participation" type="button">+ Καταχώριση </button>
      </div>
      <div id="participation-hidden-records" class="hidden-records-bar" hidden></div>
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead id="participation-head"></thead>
          <tbody id="participation-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="student-dialog">
    <form id="student-form">
      <h2> Προσθήκη μαθητή </h2>
      <label for="student-name"> Ονοματεπώνυμο </label>
      <input id="student-name" type="text" autocomplete="off" required>
      <p id="student-error" class="error-message"></p>

      <div class="student-import-section">
        <div class="import-separator"><span>ή</span></div>
        <label for="student-excel-file" class="import-file-button student-excel-button">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M12 16V4m0 0-5 5m5-5 5 5M5 20h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Εισαγωγή μαθητών από Excel</span>
        </label>
        <input id="student-excel-file" type="file" accept=".xls,.xlsx,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden>
        <p class="student-import-help">Αναγνωρίζει αυτόματα τις στήλες «Επώνυμο μαθητή» και «Όνομα μαθητή».</p>
        <p id="student-import-status" class="student-import-status" aria-live="polite"></p>
      </div>

      <div class="dialog-actions">
        <button id="cancel-student-button" class="secondary-button" type="button"> Ακύρωση </button>
        <button class="primary-button" type="submit"> Αποθήκευση </button>
      </div>
    </form>
  </dialog>

  <dialog id="item-dialog">
    <form id="item-form">
      <h2 id="item-dialog-title"> Νέα καταχώριση </h2>

      <div id="item-title-field">
        <label for="item-title"> Τίτλος </label>
        <input id="item-title" type="text" autocomplete="off">
      </div>

      <div id="item-type-field">
        <label for="item-type"> Τύπος </label>
        <input id="item-type" type="text" list="item-type-options" placeholder="Επιλέξτε ή γράψτε νέο τύπο" autocomplete="off">
        <datalist id="item-type-options"></datalist>
      </div>

      <div id="item-max-score-field" hidden>
        <label for="item-max-score">Μέγιστη βαθμολογία</label>
        <input id="item-max-score" type="number" min="0.01" step="any" value="20" placeholder="π.χ. 20 ή 100">
      </div>

      <div id="item-exercise-count-field" hidden>
        <label for="item-exercise-count">Πλήθος ασκήσεων</label>
        <input id="item-exercise-count" type="number" min="1" step="1" value="1" placeholder="π.χ. 5">
      </div>
      
      <p id="item-error" class="error-message"></p>
      
      <div class="dialog-actions">
        <button id="cancel-item-button" class="secondary-button" type="button">Ακύρωση</button>
        <button id="save-item-button" class="primary-button" type="submit">Προσθήκη</button>
      </div>
    </form>
  </dialog>

  <dialog id="student-details-dialog" class="student-details-dialog">
    <div class="student-details-content">
      <div class="student-details-header">
      <div>
        <div class="student-title-row">
          <h2 id="student-details-title"> Αναλυτικά στοιχεία μαθητή </h2>
          <button id="edit-student-name-button" class="edit-student-name-button" type="button"> Αλλαγή ονόματος </button>
        </div>
        <p id="student-details-summary"> </p>
      </div>
        <button id="close-student-details-button" class="dialog-close-button" type="button" aria-label="Κλείσιμο">×</button>
      </div>
      <div id="student-details-body"></div>
    </div>
  </dialog>

  <dialog id="edit-student-dialog">
  <form id="edit-student-form">
    <h2>Αλλαγή ονόματος μαθητή</h2>
    <label for="edit-student-name"> Ονοματεπώνυμο </label>
    <input id="edit-student-name" type="text" autocomplete="off">

    <p id="edit-student-error" class="error-message" ></p>

    <div class="dialog-actions">
      <button id="cancel-edit-student-button" class="secondary-button" type="button"> Ακύρωση </button>
      <button class="primary-button" type="submit"> Αποθήκευση </button>
    </div>
  </form>
</dialog>

</body>
</html>
